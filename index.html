<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Share Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 14px;
    padding: 28px 24px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  h2 { text-align: center; color: #1a5c2a; margin-bottom: 20px; font-size: 20px; }
  .section-title {
    font-size: 12px; font-weight: 700; color: #1a5c2a;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1.5px solid #e0f0e4;
  }
  label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }
  .land-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  input {
    width: 100%; padding: 10px;
    border: 1.5px solid #ddd; border-radius: 8px;
    font-size: 15px; outline: none;
    text-align: center; transition: border-color 0.2s;
  }
  input:focus { border-color: #1a5c2a; }
  .name-input { text-align: left; margin-bottom: 12px; }
  .hissa-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .slash { font-size: 26px; color: #aaa; font-weight: 300; flex-shrink: 0; }
  .btn {
    width: 100%; padding: 13px; background: #1a5c2a;
    color: white; border: none; border-radius: 10px;
    font-size: 16px; font-weight: bold; cursor: pointer;
  }
  .btn:hover { background: #145022; }
  .divider { border: none; border-top: 1.5px solid #e8f5e9; margin: 18px 0; }
  .result {
    margin-top: 20px; background: #f0f9f2;
    border: 1.5px solid #a5d6a7; border-radius: 12px;
    padding: 18px; display: none;
  }
  .result-name { font-size: 15px; font-weight: bold; color: #1a5c2a; margin-bottom: 2px; }
  .result-share { font-size: 12px; color: #777; margin-bottom: 8px; }
  .total-land {
    font-size: 12px; color: #555; margin-bottom: 14px;
    background: white; border: 1px solid #c8e6c9;
    border-radius: 6px; padding: 7px 10px;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .box { background: white; border: 1px solid #c8e6c9; border-radius: 8px; padding: 10px; text-align: center; }
  .box .num { font-size: 17px; font-weight: bold; color: #1a1a1a; }
  .box .unit { font-size: 11px; color: #888; margin-top: 2px; }
  .error { color: #e53935; font-size: 13px; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <h2>🌾 Land Share Calculator</h2>

  <div class="section-title">Total Land Area</div>
  <div class="land-grid">
    <div><label>Killa/Acre</label><input type="number" id="aKilla" placeholder="0" min="0"></div>
    <div><label>Bigha</label><input type="number" id="aBigha" placeholder="0" min="0"></div>
    <div><label>Kanal</label><input type="number" id="aKanal" placeholder="0" min="0"></div>
    <div><label>Biswa</label><input type="number" id="aBiswa" placeholder="0" min="0"></div>
    <div><label>Marla</label><input type="number" id="aMarla" placeholder="0" min="0"></div>
    <div><label>Gaj</label><input type="number" id="aGaj" placeholder="0" min="0"></div>
  </div>

  <hr class="divider">

  <div class="section-title">Person Details</div>
  <label>Person Name</label>
  <input type="text" id="name" placeholder="e.g. Ram Kumar" class="name-input">

  <label>Hissa (Share)</label>
  <div class="hissa-row">
    <input type="number" id="num" placeholder="15" min="1">
    <span class="slash">/</span>
    <input type="number" id="den" placeholder="963" min="1">
  </div>

  <button class="btn" onclick="calculate()">Calculate</button>
  <div class="error" id="err"></div>

  <div class="result" id="result">
    <div class="result-name" id="rName"></div>
    <div class="result-share" id="rShare"></div>
    <div class="total-land" id="rTotalLand"></div>
    <div class="grid">
      <div class="box"><div class="num" id="rKilla"></div><div class="unit">Killa/Acre</div></div>
      <div class="box"><div class="num" id="rBigha"></div><div class="unit">Bigha</div></div>
      <div class="box"><div class="num" id="rKanal"></div><div class="unit">Kanal</div></div>
      <div class="box"><div class="num" id="rBiswa"></div><div class="unit">Biswa</div></div>
      <div class="box"><div class="num" id="rMarla"></div><div class="unit">Marla</div></div>
      <div class="box"><div class="num" id="rGaj"></div><div class="unit">Gaj</div></div>
    </div>
  </div>
</div>

<script>
  var G = {
    killa:  4840,
    bigha:  1210,
    kanal:  605,
    biswa:  60.5,
    marla:  30.25,
    gaj:    1
  };

  function getVal(id) {
    return parseFloat(document.getElementById(id).value) || 0;
  }

  function fmt(val, d) {
    return parseFloat(val.toFixed(d)).toLocaleString('en-IN', { maximumFractionDigits: d });
  }

  function showErr(msg) {
    document.getElementById('err').textContent = msg;
  }

  function calculate() {
    document.getElementById('err').textContent = '';
    document.getElementById('result').style.display = 'none';

    var killa   = getVal('aKilla');
    var bigha   = getVal('aBigha');
    var kanal   = getVal('aKanal');
    var biswa   = getVal('aBiswa');
    var marla   = getVal('aMarla');
    var gaj     = getVal('aGaj');

    var totalGaj = (killa * G.killa) + (bigha * G.bigha) + (kanal * G.kanal) +
                   (biswa * G.biswa) + (marla * G.marla) + gaj;

    var name = document.getElementById('name').value.trim();
    var num  = parseFloat(document.getElementById('num').value);
    var den  = parseFloat(document.getElementById('den').value);

    if (totalGaj <= 0)                       { showErr('Enter at least one land area value.'); return; }
    if (!name)                               { showErr('Enter person name.'); return; }
    if (!num || !den || num <= 0 || den <= 0){ showErr('Enter valid hissa e.g. 15 / 963.'); return; }
    if (num > den)                           { showErr('Hissa numerator cannot exceed denominator.'); return; }

    var shareGaj = totalGaj * (num / den);
    var pct = ((num / den) * 100).toFixed(6);

    var parts = [];
    if (killa) parts.push(killa + ' Killa');
    if (bigha) parts.push(bigha + ' Bigha');
    if (kanal) parts.push(kanal + ' Kanal');
    if (biswa) parts.push(biswa + ' Biswa');
    if (marla) parts.push(marla + ' Marla');
    if (gaj)   parts.push(gaj   + ' Gaj');

    document.getElementById('rTotalLand').textContent = 'Total: ' + parts.join(' + ') + ' = ' + fmt(totalGaj, 2) + ' Gaj';
    document.getElementById('rName').textContent  = name;
    document.getElementById('rShare').textContent = 'Hissa: ' + num + '/' + den + '  (' + pct + '%)';

    document.getElementById('rKilla').textContent = fmt(shareGaj / G.killa, 4);
    document.getElementById('rBigha').textContent = fmt(shareGaj / G.bigha, 4);
    document.getElementById('rKanal').textContent = fmt(shareGaj / G.kanal, 4);
    document.getElementById('rBiswa').textContent = fmt(shareGaj / G.biswa, 3);
    document.getElementById('rMarla').textContent = fmt(shareGaj / G.marla, 3);
    document.getElementById('rGaj').textContent   = fmt(shareGaj, 2);

    document.getElementById('result').style.display = 'block';
  }

  document.addEventListener('keydown', function(e) { if (e.key === 'Enter') calculate(); });
</script>
</body>
</html>
